name: Shopee Affiliate Auto Post

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests python-dotenv openpyxl

      - name: Create env file
        run: echo "THREADS_TOKEN=${{ secrets.THREADS_TOKEN }}" > .env

      - name: Decode CSV file
        run: |
          echo "${{ secrets.PRODUCTS_CSV_B64 }}" | base64 --decode > products_aff.csv

      - name: Run tool
        run: python main.py