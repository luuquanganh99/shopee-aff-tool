name: Shopee Affiliate Auto Post

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests python-dotenv openpyxl

      - name: Create env file
        run: echo "THREADS_TOKEN=${{ secrets.THREADS_TOKEN }}" > .env

      - name: Create CSV file
        run: echo "${{ secrets.PRODUCTS_CSV }}" > products_aff.csv

      - name: Run tool
        run: python main.py